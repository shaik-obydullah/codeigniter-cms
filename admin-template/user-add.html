<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add User - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <div class="flex h-screen overflow-hidden">

        <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0">
            <div class="p-5 border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-lime-500 rounded-lg flex items-center justify-center">
                        <i class="fas fa-shield-halved text-sm text-gray-900"></i>
                    </div>
                    <div>
                        <h1 class="text-white font-bold text-sm">AdminPanel</h1>
                        <p class="text-gray-500 text-xs">v1.0.0</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-3 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm">
                    <i class="fas fa-chart-pie w-5 text-center"></i>
                    <span>Dashboard</span>
                </a>
                <a href="articles.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm">
                    <i class="fas fa-newspaper w-5 text-center"></i>
                    <span>Articles</span>
                </a>
                <a href="projects.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm">
                    <i class="fas fa-diagram-project w-5 text-center"></i>
                    <span>Projects</span>
                </a>
                <a href="users.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-lime-500 text-gray-900 font-medium text-sm">
                    <i class="fas fa-users w-5 text-center"></i>
                    <span>Users</span>
                </a>
                <a href="categories.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-folder w-5 text-center"></i><span>Categories</span></a>
                <a href="tags.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-tags w-5 text-center"></i><span>Tags</span></a>
                <a href="comments.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm">
                    <i class="fas fa-comments w-5 text-center"></i>
                    <span>Comments</span>
                </a>

                <div class="pt-4 pb-2"><p class="px-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">Settings</p></div>
                <a href="site-settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-gear w-5 text-center"></i><span>Site Settings</span></a>
                <a href="roles.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-shield w-5 text-center"></i><span>Roles & Permissions</span></a>
                <a href="activities.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-clock-rotate-left w-5 text-center"></i><span>Activities</span></a>
                <a href="notifications.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-bell w-5 text-center"></i><span>Notifications</span></a>
                <a href="skills.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-code w-5 text-center"></i><span>Skills</span></a>
            </nav>

            <div class="p-3 border-t border-gray-700">
                <a href="login.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-red-400 hover:bg-gray-700 transition text-sm">
                    <i class="fas fa-right-from-bracket w-5 text-center"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">

            <header class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <button class="text-gray-400 hover:text-white lg:hidden">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h2 class="text-white font-semibold text-lg">Add User</h2>
                </div>
                <div class="flex items-center gap-4">
                    <button class="text-gray-400 hover:text-white relative">
                        <i class="fas fa-bell text-lg"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] flex items-center justify-center text-white font-medium">3</span>
                    </button>
                    <div class="flex items-center gap-2.5">
                        <div class="w-8 h-8 bg-gray-600 rounded-full flex items-center justify-center text-sm font-medium text-white">SO</div>
                        <div class="hidden sm:block">
                            <p class="text-sm text-white font-medium leading-tight">Shaik Obydullah</p>
                            <p class="text-xs text-gray-500">Super Admin</p>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">

                <div class="flex items-center gap-2 text-sm text-gray-500 mb-5">
                    <a href="users.html" class="hover:text-lime-400 transition">Users</a>
                    <i class="fas fa-chevron-right text-[10px]"></i>
                    <span class="text-gray-300">Add User</span>
                </div>

                <form class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                    <div class="lg:col-span-2 space-y-6">

                        <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
                            <h3 class="text-white font-semibold text-sm mb-4">Account Information</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label for="first_name" class="block text-sm font-medium text-gray-300 mb-1.5">First Name</label>
                                    <input type="text" id="first_name" placeholder="John"
                                        class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                                </div>
                                <div>
                                    <label for="last_name" class="block text-sm font-medium text-gray-300 mb-1.5">Last Name</label>
                                    <input type="text" id="last_name" placeholder="Doe"
                                        class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                                </div>
                                <div>
                                    <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
                                    <input type="email" id="email" placeholder="john@example.com"
                                        class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                                </div>
                                <div>
                                    <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
                                    <input type="text" id="username" placeholder="johndoe"
                                        class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                                </div>
                            </div>
                        </div>

                        <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
                            <h3 class="text-white font-semibold text-sm mb-4">Password</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                                    <input type="password" id="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
                                        class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                                </div>
                                <div>
                                    <label for="confirm_password" class="block text-sm font-medium text-gray-300 mb-1.5">Confirm Password</label>
                                    <input type="password" id="confirm_password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
                                        class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">

                        <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
                            <h3 class="text-white font-semibold text-sm mb-3">Account Status</h3>
                            <div class="space-y-3">
                                <div>
                                    <label class="text-xs text-gray-500 block mb-1">Status</label>
                                    <select class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent">
                                        <option>Active</option>
                                        <option>Inactive</option>
                                        <option>Banned</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
                            <h3 class="text-white font-semibold text-sm mb-3">Role</h3>
                            <div class="space-y-2">
                                <label class="flex items-center gap-2.5 cursor-pointer">
                                    <input type="radio" name="role" checked
                                        class="w-4 h-4 bg-gray-700 border-gray-600 text-lime-500 focus:ring-lime-500 focus:ring-offset-0 cursor-pointer" />
                                    <div>
                                        <span class="text-sm text-gray-300">Super Admin</span>
                                        <p class="text-xs text-gray-500">Complete control of the site.</p>
                                    </div>
                                </label>
                                <label class="flex items-center gap-2.5 cursor-pointer">
                                    <input type="radio" name="role"
                                        class="w-4 h-4 bg-gray-700 border-gray-600 text-lime-500 focus:ring-lime-500 focus:ring-offset-0 cursor-pointer" />
                                    <div>
                                        <span class="text-sm text-gray-300">Admin</span>
                                        <p class="text-xs text-gray-500">Day to day administrators.</p>
                                    </div>
                                </label>
                                <label class="flex items-center gap-2.5 cursor-pointer">
                                    <input type="radio" name="role"
                                        class="w-4 h-4 bg-gray-700 border-gray-600 text-lime-500 focus:ring-lime-500 focus:ring-offset-0 cursor-pointer" />
                                    <div>
                                        <span class="text-sm text-gray-300">Developer</span>
                                        <p class="text-xs text-gray-500">Site programmers.</p>
                                    </div>
                                </label>
                                <label class="flex items-center gap-2.5 cursor-pointer">
                                    <input type="radio" name="role"
                                        class="w-4 h-4 bg-gray-700 border-gray-600 text-lime-500 focus:ring-lime-500 focus:ring-offset-0 cursor-pointer" />
                                    <div>
                                        <span class="text-sm text-gray-300">User</span>
                                        <p class="text-xs text-gray-500">General users of the site.</p>
                                    </div>
                                </label>
                                <label class="flex items-center gap-2.5 cursor-pointer">
                                    <input type="radio" name="role"
                                        class="w-4 h-4 bg-gray-700 border-gray-600 text-lime-500 focus:ring-lime-500 focus:ring-offset-0 cursor-pointer" />
                                    <div>
                                        <span class="text-sm text-gray-300">Beta User</span>
                                        <p class="text-xs text-gray-500">Access to beta-level features.</p>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <button type="submit" class="flex-1 bg-lime-500 text-gray-900 font-semibold px-4 py-2.5 rounded-lg hover:bg-lime-400 transition text-sm">Create User</button>
                            <button type="reset" class="flex-1 bg-gray-700 text-gray-300 font-medium px-4 py-2.5 rounded-lg hover:bg-gray-600 transition text-sm">Reset</button>
                        </div>
                    </div>
                </form>
            </main>
        </div>
    </div>

</body>
</html>
