<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Settings - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0">
            <div class="p-5 border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-lime-500 rounded-lg flex items-center justify-center"><i class="fas fa-shield-halved text-sm text-gray-900"></i></div>
                    <div><h1 class="text-white font-bold text-sm">AdminPanel</h1><p class="text-gray-500 text-xs">v1.0.0</p></div>
                </div>
            </div>
            <nav class="flex-1 overflow-y-auto p-3 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-chart-pie w-5 text-center"></i><span>Dashboard</span></a>
                <a href="articles.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-newspaper w-5 text-center"></i><span>Articles</span></a>
                <a href="projects.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-diagram-project w-5 text-center"></i><span>Projects</span></a>
                <a href="users.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-users w-5 text-center"></i><span>Users</span></a>
                <a href="categories.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-folder w-5 text-center"></i><span>Categories</span></a>
                <a href="tags.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-tags w-5 text-center"></i><span>Tags</span></a>
                <a href="comments.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-comments w-5 text-center"></i><span>Comments</span></a>
                <div class="pt-4 pb-2"><p class="px-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">Settings</p></div>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-lime-500 text-gray-900 font-medium text-sm"><i class="fas fa-gear w-5 text-center"></i><span>Site Settings</span></a>
                <a href="roles.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-shield w-5 text-center"></i><span>Roles & Permissions</span></a>
                <a href="activities.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-clock-rotate-left w-5 text-center"></i><span>Activities</span></a>
                <a href="notifications.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition text-sm"><i class="fas fa-bell w-5 text-center"></i><span>Notifications</span></a>
            </nav>
            <div class="p-3 border-t border-gray-700">
                <a href="login.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-red-400 hover:bg-gray-700 transition text-sm"><i class="fas fa-right-from-bracket w-5 text-center"></i><span>Logout</span></a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            <header class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <button class="text-gray-400 hover:text-white lg:hidden"><i class="fas fa-bars text-xl"></i></button>
                    <h2 class="text-white font-semibold text-lg">Site Settings</h2>
                </div>
                <div class="flex items-center gap-4">
                    <button class="text-gray-400 hover:text-white relative"><i class="fas fa-bell text-lg"></i><span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] flex items-center justify-center text-white font-medium">3</span></button>
                    <div class="flex items-center gap-2.5">
                        <div class="w-8 h-8 bg-gray-600 rounded-full flex items-center justify-center text-sm font-medium text-white">SO</div>
                        <div class="hidden sm:block"><p class="text-sm text-white font-medium leading-tight">Shaik Obydullah</p><p class="text-xs text-gray-500">Super Admin</p></div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <form class="max-w-3xl space-y-6">

                    <!-- General -->
                    <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
                        <h3 class="text-white font-semibold text-sm mb-4">General</h3>
                        <div class="space-y-4">
                            <div>
                                <label for="site_name" class="block text-sm font-medium text-gray-300 mb-1.5">Site Name</label>
                                <input type="text" id="site_name" value="Shaik Obydullah"
                                    class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent" />
                            </div>
                            <div>
                                <label for="site_tagline" class="block text-sm font-medium text-gray-300 mb-1.5">Tagline</label>
                                <input type="text" id="site_tagline" value="Software Engineer | Laravel | Next.js | MySQL"
                                    class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent" />
                            </div>
                            <div>
                                <label for="site_email" class="block text-sm font-medium text-gray-300 mb-1.5">Contact Email</label>
                                <input type="email" id="site_email" value="contact@obydullah.com"
                                    class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent" />
                            </div>
                            <div>
                                <label for="site_description" class="block text-sm font-medium text-gray-300 mb-1.5">Site Description</label>
                                <textarea id="site_description" rows="3"
                                    class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent resize-none">Shaik Obydullah - Software Engineer specializing in Laravel, Next.js, and MySQL.</textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Social Links -->
                    <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
                        <h3 class="text-white font-semibold text-sm mb-4">Social Links</h3>
                        <div class="space-y-4">
                            <div class="flex items-center gap-3">
                                <span class="w-8 text-gray-500 text-center"><i class="fab fa-github"></i></span>
                                <input type="url" placeholder="https://github.com/username"
                                    class="flex-1 bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="w-8 text-gray-500 text-center"><i class="fab fa-linkedin-in"></i></span>
                                <input type="url" placeholder="https://linkedin.com/in/username"
                                    class="flex-1 bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="w-8 text-gray-500 text-center"><i class="fab fa-twitter"></i></span>
                                <input type="url" placeholder="https://twitter.com/username"
                                    class="flex-1 bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="w-8 text-gray-500 text-center"><i class="fab fa-youtube"></i></span>
                                <input type="url" placeholder="https://youtube.com/@channel"
                                    class="flex-1 bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent placeholder-gray-500" />
                            </div>
                        </div>
                    </div>

                    <!-- Appearance -->
                    <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
                        <h3 class="text-white font-semibold text-sm mb-4">Appearance</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-sm font-medium text-gray-300 mb-1.5 block">Theme Mode</label>
                                <div class="flex gap-3">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" name="theme" checked
                                            class="w-4 h-4 bg-gray-700 border-gray-600 text-lime-500 focus:ring-lime-500 focus:ring-offset-0 cursor-pointer" />
                                        <span class="text-sm text-gray-300">Dark</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" name="theme"
                                            class="w-4 h-4 bg-gray-700 border-gray-600 text-lime-500 focus:ring-lime-500 focus:ring-offset-0 cursor-pointer" />
                                        <span class="text-sm text-gray-300">Light</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" name="theme"
                                            class="w-4 h-4 bg-gray-700 border-gray-600 text-lime-500 focus:ring-lime-500 focus:ring-offset-0 cursor-pointer" />
                                        <span class="text-sm text-gray-300">Auto</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label for="items_per_page" class="block text-sm font-medium text-gray-300 mb-1.5">Items Per Page</label>
                                <select id="items_per_page"
                                    class="w-full sm:w-48 bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent">
                                    <option>10</option>
                                    <option selected>15</option>
                                    <option>25</option>
                                    <option>50</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Maintenance -->
                    <div class="bg-gray-800 rounded-xl border border-gray-700 p-5">
                        <h3 class="text-white font-semibold text-sm mb-4">Maintenance</h3>
                        <div class="space-y-4">
                            <label class="flex items-center justify-between cursor-pointer">
                                <div>
                                    <p class="text-sm text-gray-300">Maintenance Mode</p>
                                    <p class="text-xs text-gray-500">When enabled, only admins can access the site.</p>
                                </div>
                                <div class="relative">
                                    <input type="checkbox" class="sr-only peer" />
                                    <div class="w-10 h-5 bg-gray-700 rounded-full peer-checked:bg-lime-500 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:w-4 after:h-4 after:bg-white after:rounded-full after:transition-all peer-checked:after:translate-x-5"></div>
                                </div>
                            </label>
                            <label class="flex items-center justify-between cursor-pointer">
                                <div>
                                    <p class="text-sm text-gray-300">Allow Registration</p>
                                    <p class="text-xs text-gray-500">Allow new users to register on the site.</p>
                                </div>
                                <div class="relative">
                                    <input type="checkbox" checked class="sr-only peer" />
                                    <div class="w-10 h-5 bg-gray-700 rounded-full peer-checked:bg-lime-500 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:w-4 after:h-4 after:bg-white after:rounded-full after:transition-all peer-checked:after:translate-x-5"></div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="flex items-center gap-3">
                        <button type="submit" class="bg-lime-500 text-gray-900 font-semibold px-6 py-2.5 rounded-lg hover:bg-lime-400 transition text-sm">Save Settings</button>
                        <button type="reset" class="bg-gray-700 text-gray-300 font-medium px-6 py-2.5 rounded-lg hover:bg-gray-600 transition text-sm">Reset</button>
                    </div>
                </form>
            </main>
        </div>
    </div>

</body>
</html>
