services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ci-app
    volumes:
      - ./src:/var/www/html
    networks:
      - ci-network
    environment:
      CI_ENVIRONMENT: development
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: ci-nginx
    ports:
      - "8087:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ci-network
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: ci-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ci-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ci-phpmyadmin
    ports:
      - "8090:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    networks:
      - ci-network
    depends_on:
      - db

networks:
  ci-network:
    driver: bridge

volumes:
  db_data:
